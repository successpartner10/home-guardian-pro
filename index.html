<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SecureCam - Smart Security Camera</title>
    <meta name="description" content="Turn old smartphones into security cameras. Monitor your home in real-time with motion detection and instant alerts." />
    <meta name="theme-color" content="#0f1419" />
    <meta property="og:title" content="SecureCam - Smart Security Camera" />
    <meta property="og:description" content="Turn old smartphones into security cameras with real-time streaming and motion detection." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/dev-sw.js?dev-sw', { type: 'module' })
            .catch(error => console.log('SW registration failed:', error));
        });
      }
    </script>
  </body>
</html>
